{id:'yc',cat:'рҹҘЈ зІҘжұӨзұ»',n:'жІ№иҢ¶',p:2,e:'рҹҚө',u:'зў—'}
];

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let isAdmin=false,cur=1,cache=[];
const cart={};for(let t=1;t<=4;t++){cart[t]={};M.forEach(m=>cart[t][m.id]=0);}

// жёІжҹ“иҸңеҚ•
(function renderMenu(){
    let h='',last='';
    M.forEach(m=>{
        if(m.cat!==last){h+='<div class="cat">'+m.cat+'</div>';last=m.cat;}
        h+='<div class="row"><div class="info"><div class="n">'+m.n+'</div><div class="p">ВҘ'+m.p.toFixed(2)+'/'+m.u+'</div></div><div class="qw"><div class="bq" onclick="cq(\''+m.id+'\',-1)">вҲ’</div><div class="qt" id="q-'+m.id+'">0</div><div class="bq" onclick="cq(\''+m.id+'\',1)">+</div></div><div class="sb" id="s-'+m.id+'">ВҘ0</div></div>';
    });
    document.getElementById('menu').innerHTML=h;
})();

function st(t){cur=t;for(let i=1;i<=4;i++)document.getElementById('tb'+i).classList.remove('on');document.getElementById('tb'+t).classList.add('on');document.getElementById('ct').textContent='рҹ“Қ еҪ“еүҚпјҡрҹӘ‘ '+t+'еҸ·жЎҢ';M.forEach(m=>{document.getElementById('q-'+m.id).textContent=cart[t][m.id];document.getElementById('s-'+m.id).textContent='ВҘ'+(cart[t][m.id]*m.p).toFixed(2);});ut();}
function cq(id,d){let n=cart[cur][id]+d;if(n<0)n=0;if(n>99)n=99;cart[cur][id]=n;document.getElementById('q-'+id).textContent=n;document.getElementById('s-'+id).textContent='ВҘ'+(n*M.find(m=>m.id===id).p).toFixed(2);ut();}

// ===== дёӢеҚ•пјҲжүӢжңәеҸӢеҘҪзүҲпјү=====
async function checkout(){
    let items=[],t=0,c=0,detail='';
    M.forEach(m=>{
        let q=cart[cur][m.id];
        if(q>0){
            let s=q*m.p;
            detail+=m.e+' '+m.n+' Г—'+q+' = ВҘ'+s.toFixed(2)+'\n';
            items.push({name:m.n,emoji:m.e,qty:q,unit:m.u,price:m.p,subtotal:s});
            t+=s;c+=q;
        }
    });
    if(c===0){alert('иҜ·е…ҲйҖүйӨҗ');return;}
    detail+='\nрҹ’° еҗҲи®ЎпјҡВҘ'+t.toFixed(2)+'пјҲ'+c+'д»¶пјү';
    
    // з”ЁиҮӘе®ҡд№үеј№зӘ—д»Јжӣҝ confirm
    let ok=await new Promise(resolve=>{
        let div=document.createElement('div');
        div.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px';
        div.innerHTML='<div style="background:#fff;border-radius:16px;padding:20px;max-width:320px;width:100%;text-align:center"><div style="font-size:15px;margin-bottom:12px;white-space:pre-line;text-align:left">рҹ“Ӣ '+cur+'еҸ·жЎҢпјҡ\n\n'+detail+'</div><button id="cfmOk" style="width:100%;padding:12px;background:#f57c00;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;margin-bottom:6px">вң… зЎ®и®ӨдёӢеҚ•</button><button id="cfmCancel" style="width:100%;padding:10px;background:#fff;border:1px solid:#ddd;border-radius:10px;color:#999;font-size:14px">еҸ–ж¶Ҳ</button></div>';
        document.body.appendChild(div);
        document.getElementById('cfmOk').onclick=()=>{div.remove();resolve(true);};
        document.getElementById('cfmCancel').onclick=()=>{div.remove();resolve(false);};
    });
    if(!ok)return;
    
    await sb.from('orders').insert({table_num:cur,items:items,total:t});
    alert('дёӢеҚ•жҲҗеҠҹпјҒ');
    M.forEach(m=>{cart[cur][m.id]=0;document.getElementById('q-'+m.id).textContent='0';document.getElementById('s-'+m.id).textContent='ВҘ0';});

}

async function ld(){let{data,error}=await sb.from('orders').select('*').order('created_at',{ascending:false});if(!error){cache=data||[];}if(isAdmin)rp();}
function getHD(){return cache.map(o=>({id:o.id,date:new Date(o.created_at).toLocaleString('zh-CN'),table:o.table_num,items:o.items,total:o.total}));}
function ci(ods){let c={};ods.forEach(o=>o.items.forEach(i=>{if(!c[i.name])c[i.name]=0;c[i.name]+=i.qty;}));return Object.entries(c).sort((a,b)=>b[1]-a[1]);}
function br(data,max=5){if(data.length===0)return'<div style="text-align:center;color:#ccc;padding:10px;">жҡӮж— </div>';let mx=data[0][1];return data.slice(0,max).map((r,i)=>{let cl=i===0?'g1':i===1?'g2':i===2?'g3':'g4';return'<div class="rk"><div class="rb '+cl+'">'+(i+1)+'</div><span class="rn">'+r[0]+'</span><div class="rbar"><div class="rf" style="width:'+(r[1]/mx*100).toFixed(0)+'%"></div></div><span>'+r[1]+'</span></div>';}).join('');}
function rp(){
    if(!isAdmin)return;
    let h=getHD(),ts=new Date().toLocaleDateString('zh-CN'),tod=h.filter(o=>o.date.includes(ts)),tt=0;tod.forEach(o=>tt+=o.total);
    let tb={1:0,2:0,3:0,4:0},tc={1:0,2:0,3:0,4:0};tod.forEach(o=>{let tn=o.table;if(tb[tn]!==undefined){tb[tn]+=o.total;tc[tn]++;}});
    let th='';for(let t=1;t<=4;t++)th+='<div class="tsr">рҹӘ‘ '+t+'еҸ·жЎҢ <span>ВҘ'+tb[t].toFixed(2)+'</span>пјҲ'+tc[t]+'еҚ•пјү</div>';
    document.getElementById('panel').innerHTML='<div class="sb2"><div class="v">ВҘ'+tt.toFixed(2)+'</div><div class="l">рҹ’° д»Ҡж—Ҙй”Җе”®йўқ</div></div><div class="sr"><div class="ss"><div class="v">'+tod.length+'</div><div class="l">рҹ“Ӣ д»Ҡж—Ҙи®ўеҚ•</div></div></div><div class="st">рҹҸҶ д»Ҡж—Ҙз•…й”ҖжҺ’иЎҢ</div>'+br(ci(tod),5)+'<div class="st" style="margin-top:8px">рҹӘ‘ еҗ„жЎҢд»Ҡж—Ҙ</div>'+th+'<button class="btn g" style="width:100%;margin-top:8px" onclick="openHistory()">рҹ“Ӣ е…ЁйғЁи®°еҪ•</button>';

function openExport(){

function de(range){
    let h=getHD(),f=h,label='е…ЁйғЁ',now=new Date();
    if(range==='today'){let ts=now.toLocaleDateString('zh-CN');f=h.filter(x=>x.date.includes(ts));label='д»Ҡж—Ҙ';}
    else if(range==='week'){let wa=new Date(now.getTime()-7*24*60*60*1000).toLocaleDateString('zh-CN');f=h.filter(x=>x.date.split(' ')[0]>=wa);label='7еӨ©';}
    if(f.length===0){alert('ж— ж•°жҚ®');return;}
    let csv='\uFEFFеәҸеҸ·,ж—Ҙжңҹ,жЎҢеҸ·,е•Ҷе“Ғ,ж•°йҮҸ,еҚ•д»·,е°Ҹи®Ў,и®ўеҚ•жҖ»йўқ\n',idx=1;
    f.forEach(o=>o.items.forEach(i=>{csv+=idx+',"'+o.date+'",'+o.table+'еҸ·жЎҢ,"'+i.name+'",'+i.qty+','+i.price.toFixed(2)+','+i.subtotal.toFixed(2)+','+o.total.toFixed(2)+'\n';idx++;}));
    let blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}),a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download='ж—©йӨҗи®ўеҚ•_'+label+'.csv';a.click();
    alert('вң… е·ІеҜјеҮәгҖҢ'+label+'гҖҚж•°жҚ®пјҒ');
}

function openHistory(){
    if(!isAdmin){alert('иҜ·е…Ҳзҷ»еҪ•з®ЎзҗҶе‘ҳ');return;}
    let h=getHD(),total=h.length,sales=0;h.forEach(x=>sales+=x.total);
    let html='<div style="display:flex;gap:6px;margin-bottom:10px"><div class="ss"><div class="v">'+total+'</div><div class="l">жҖ»и®ўеҚ•</div></div><div class="ss"><div class="v">ВҘ'+sales.toFixed(2)+'</div><div class="l">зҙҜи®Ўй”Җе”®</div></div></div>';
    html+='<div class="st">рҹҸҶ зҙҜи®Ўз•…й”ҖжҺ’иЎҢ</div>'+br(ci(h),10)+'<hr style="margin:8px 0">';
    html+=h.length===0?'<div style="text-align:center;color:#ccc;">жҡӮж— и®°еҪ•</div>':h.slice(0,50).map(x=>{let ih=x.items.map(i=>i.emoji+' '+i.name+' Г—'+i.qty+'пјҲВҘ'+i.subtotal.toFixed(2)+'пјү').join('<br>');return'<div class="hitem"><button class="del" data-id="'+x.id+'">рҹ—‘пёҸ</button><div class="hd"><span class="htag">рҹӘ‘ '+x.table+'еҸ·жЎҢ</span> '+x.date+'</div><div class="hdet">'+ih+'</div><div class="ht">рҹ’° ВҘ'+x.total.toFixed(2)+'</div></div>';}).join('');
    html+='<button class="danger" id="btnDelAll">рҹ—‘пёҸ жё…з©әе…ЁйғЁ</button>';
    document.getElementById('panel').style.overflowY='auto';
    document.getElementById('panel').style.maxHeight='70vh';
    document.getElementById('panel').innerHTML='<div class="st">рҹ“Ҡ е…ЁйғЁи®°еҪ•</div>'+html+'<button class="btn" style="width:100%;margin-top:6px" onclick="rp()">вҶ© иҝ”еӣһйҰ–йЎө</button>';
    document.querySelectorAll('.del').forEach(b=>{b.onclick=function(){del(parseInt(this.dataset.id));};});
    let ba=document.getElementById('btnDelAll');if(ba)ba.onclick=delAll;
}
async function del(id){if(!confirm('зЎ®е®ҡеҲ йҷӨпјҹ'))return;await sb.from('orders').delete().eq('id',id);await ld();openHistory();}
async function delAll(){if(!confirm('вҡ пёҸжё…з©әе…ЁйғЁпјҹдёҚеҸҜжҒўеӨҚпјҒ'))return;await sb.from('orders').delete().gt('id',0);await ld();rp();alert('е·Іжё…з©ә');}

st(1);
setInterval(()=>{ld();},30000);
</script>
