<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🥣 早餐点餐</title>
<meta property="og:title" content="🥣 早餐点餐系统">
<meta property="og:description" content="四桌独立下单 · 云端同步 · 实时汇总">
<meta property="og:image" content="https://img.icons8.com/emoji/256/breakfast-emoji.png">
<meta property="og:url" content="https://action4dot.github.io/breakfast/">
<meta name="twitter:card" content="summary">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#fef7e9 0%,#fff3e0 50%,#ffe0b2 100%);min-height:100vh;padding:12px;display:flex;justify-content:center;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.app{max-width:920px;width:100%;display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 4px 20px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.03);transition:all .3s ease;animation:cardIn .4s ease both}
.card:nth-child(1){animation-delay:0s}.card:nth-child(2){animation-delay:.1s}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.left{flex:1;min-width:340px;max-width:500px}
.right{width:320px;position:sticky;top:14px;align-self:flex-start}
h2{font-size:22px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.btns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.btn{padding:6px 14px;border-radius:20px;border:2px solid #f57c00;background:#fff;color:#f57c00;font-weight:600;font-size:12px;cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden}
.btn:hover{background:#f57c00;color:#fff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,124,0,.2)}
.btn:active{transform:scale(.96)}
.btn.g{border-color:#43a047;color:#43a047}
.btn.g:hover{background:#43a047;color:#fff;box-shadow:0 4px 12px rgba(67,160,71,.2)}
.badge{background:#e65100;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,124,0,.4)}50%{box-shadow:0 0 0 8px rgba(245,124,0,0)}}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin:10px 0}
.tb{padding:10px 2px;border:2px solid #eee;border-radius:12px;text-align:center;font-weight:700;cursor:pointer;font-size:13px;color:#999;transition:all .25s ease;background:#fafafa}
.tb:hover{border-color:#f57c00;color:#f57c00;background:#fff8f0;transform:translateY(-2px)}
.tb.on{border-color:#f57c00;background:linear-gradient(135deg,#fff3e0,#ffe0b2);color:#f57c00;box-shadow:0 4px 12px rgba(245,124,0,.12)}
.tb span{display:block;font-size:18px;margin-bottom:2px}
.tb:active{transform:scale(.95)}
.ct{text-align:center;font-size:13px;color:#f57c00;font-weight:700;background:#fff8f0;padding:5px;border-radius:10px;margin-bottom:8px;transition:all .3s}
.cat{font-size:16px;font-weight:700;color:#e65100;margin:14px 0 6px;padding-bottom:4px;border-bottom:2px dashed #ffe0b2;transition:all .2s}
.row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;gap:6px;transition:all .2s ease}
.row:hover{background:#fafafa;border-radius:8px;padding-left:6px;padding-right:6px}
.row .info{flex:1;min-width:80px}
.row .n{font-size:16px;font-weight:600}
.row .p{font-size:12px;color:#999}
.qw{display:flex;align-items:center;gap:6px}
.bq{width:30px;height:30px;border-radius:50%;border:2px solid #f57c00;background:#fff;color:#f57c00;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
.bq:hover{background:#f57c00;color:#fff;transform:scale(1.1)}
.bq:active{transform:scale(.9)}
.qt{font-size:16px;font-weight:700;min-width:18px;text-align:center}
.sb{font-size:14px;color:#f57c00;font-weight:700;min-width:42px;text-align:right}
.tb2{background:linear-gradient(135deg,#fff8f0,#fff3e0);padding:12px;border-radius:12px;text-align:center;margin-top:10px;transition:all .3s}
.tp{font-size:30px;color:#f57c00;font-weight:700;animation:bounceIn .5s ease}
@keyframes bounceIn{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.br{display:flex;gap:8px;margin-top:10px}
.bb{flex:1;padding:12px;background:linear-gradient(135deg,#ff9800,#f57c00);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s ease;box-shadow:0 4px 14px rgba(245,124,0,.2)}
.bb:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(245,124,0,.3)}
.bb:active{transform:scale(.97)}
.bc{padding:12px 16px;background:#fff;border:1px solid #ddd;border-radius:12px;color:#999;font-size:13px;cursor:pointer;transition:all .2s}
.bc:hover{background:#f5f5f5}
.sb2{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);padding:12px;border-radius:12px;text-align:center;margin-bottom:10px;animation:fadeIn .4s ease}
.sb2 .v{font-size:32px;color:#2e7d32;font-weight:700}
.sb2 .l{font-size:12px;color:#555;margin-top:2px}
.sr{display:flex;gap:8px;margin-bottom:10px}
.ss{flex:1;background:#fafafa;padding:10px;border-radius:10px;text-align:center;transition:all .2s}
.ss:hover{background:#f0f0f0}
.ss .v{font-size:16px;font-weight:700;color:#f57c00}
.ss .l{font-size:11px;color:#999}
.st{font-size:14px;font-weight:700;margin:10px 0 5px;color:#444}
.rk{display:flex;align-items:center;gap:5px;padding:5px 8px;background:#fafafa;border-radius:8px;margin-bottom:4px;font-size:11px;transition:all .2s}
.rk:hover{background:#fff3e0;transform:translateX(2px)}
.rk .rb{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700}
.g1{background:#ffd700}.g2{background:silver}.g3{background:#cd7f32}.g4{background:#ddd;color:#666}
.rk .rn{flex:1}
.rk .rbar{flex:1;height:4px;background:#eee;border-radius:2px;overflow:hidden}
.rk .rf{height:100%;background:linear-gradient(90deg,#ff9800,#f57c00);border-radius:2px;transition:width .5s ease}
.tsr{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px dashed #eee;transition:all .2s}
.tsr:hover{background:#fafafa}
.tsr span{color:#f57c00;font-weight:700}
/* 最近订单列表 */
.recent-item{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;border-bottom:1px dashed #eee;font-size:13px;transition:all .2s}
.recent-item:hover{background:#fafafa}
.recent-item .rinfo{flex:1}
.recent-item .rname{font-size:13px;font-weight:600;color:#333}
.recent-item .rdetail{font-size:12px;color:#999;margin-top:1px}
.recent-item .rprice{font-size:14px;font-weight:700;color:#f57c00}
.recent-delete{width:22px;height:22px;border-radius:50%;border:none;background:#fff;color:#ff5252;cursor:pointer;font-size:11px;margin-left:6px;transition:all .2s;flex-shrink:0}
.recent-delete:hover{background:#ff5252;color:#fff}
/* 弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:998;display:flex;align-items:center;justify-content:center;padding:14px;animation:fadeIn .2s ease;backdrop-filter:blur(2px)}
.modal-box{background:#fff;border-radius:16px;padding:18px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;animation:cardIn .25s ease;box-shadow:0 20px 50px rgba(0,0,0,.15)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #eee}
.modal-head span{font-size:17px;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:#eee;cursor:pointer;font-size:14px;transition:all .2s}
.modal-close:hover{background:#ff5252;color:#fff;transform:rotate(90deg)}
.hitem{background:#fafafa;padding:8px;border-radius:10px;margin-bottom:6px;border-left:4px solid #f57c00;position:relative;transition:all .2s;animation:fadeIn .3s ease}
.hitem:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.htag{background:#f57c00;color:#fff;font-size:10px;padding:2px 7px;border-radius:6px;margin-right:4px}
.hd{font-size:10px;color:#999;margin-bottom:3px}
.hdet{font-size:11px;color:#555;line-height:1.5;padding-right:22px}
.ht{font-size:13px;color:#f57c00;font-weight:700;text-align:right;margin-top:3px}
.del-btn{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;border:none;background:#fff;color:#ff5252;cursor:pointer;font-size:11px;transition:all .2s}
.del-btn:hover{background:#ff5252;color:#fff;transform:scale(1.15)}
.danger{width:100%;padding:8px;margin-top:6px;border:1px solid #ff5252;border-radius:8px;background:#fff;color:#ff5252;font-size:12px;cursor:pointer;transition:all .2s}
.danger:hover{background:#ff5252;color:#fff}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease;backdrop-filter:blur(3px)}
.confirm-box{background:#fff;border-radius:18px;padding:22px;max-width:320px;width:100%;text-align:center;animation:cardIn .2s ease;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.confirm-box .msg{font-size:14px;margin-bottom:14px;white-space:pre-line;text-align:left;line-height:1.6}
.confirm-btn{width:100%;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:6px;transition:all .2s}
.confirm-btn.red{background:#ff5252;color:#fff}
.confirm-btn.red:hover{background:#d32f2f;transform:translateY(-1px)}
.confirm-btn.org{background:linear-gradient(135deg,#ff9800,#f57c00);color:#fff}
.confirm-btn.org:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(245,124,0,.3)}
.confirm-cancel{width:100%;padding:10px;background:#fff;border:1px solid #ddd;border-radius:12px;color:#999;font-size:14px;cursor:pointer;transition:all .2s}
.confirm-cancel:hover{background:#f5f5f5}
.skeleton{background:linear-gradient(90deg,#e0e0e0 25%,#f0f0f0 50%,#e0e0e0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;height:20px;margin:8px 0}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(max-width:720px){.app{flex-direction:column;align-items:center}.right{position:static;width:100%;max-width:500px}}
</style>
</head>
<body>
<div class="app">
<div class="card left">
<h2>🌅 早餐点餐<span id="badge"></span></h2>
<div class="btns">
<button class="btn" onclick="openHistory()">📋 记录</button>
<button class="btn g" onclick="openExport()">📥 导出</button>
<button class="btn" style="border-color:#e65100;color:#e65100" onclick="toggleAdmin()" id="btnA">🔐 管理员</button>
</div>
<p style="font-size:11px;color:#999;text-align:center;margin-bottom:4px">👇 选择桌号（云端同步）</p>
<div class="tabs">
<div class="tb on" onclick="st(1)" id="tb1"><span>🪑</span>1号桌</div>
<div class="tb" onclick="st(2)" id="tb2"><span>🪑</span>2号桌</div>
<div class="tb" onclick="st(3)" id="tb3"><span>🪑</span>3号桌</div>
<div class="tb" onclick="st(4)" id="tb4"><span>🪑</span>4号桌</div>
</div>
<div class="ct" id="ct">📍 当前：🪑 1号桌</div>
<div id="menu"></div>
<div class="tb2"><span>💰 合计 </span><span class="tp" id="tp">¥0.00</span></div>
<div class="br"><button class="bc" onclick="clearCart()">🗑️ 清空</button><button class="bb" onclick="checkout()">🛒 下单</button></div>
</div>
<div class="card right" id="panel">
<div class="skeleton" style="height:60px;margin-bottom:10px"></div>
<div class="skeleton" style="height:40px;margin-bottom:10px"></div>
<div class="skeleton" style="height:100px"></div>
</div>
</div>

<script>
const SUPABASE_URL = 'https://rvlovmrfszobzsouoevn.supabase.co';
const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2bG92bXJmc3pvYnpzb3VvZXZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTMzNjYsImV4cCI6MjA5MzAyOTM2Nn0.pnlUamRDlO3U_oNWf1BQQTkC9tMM8gNdZGKPb2W3F2w';
const ADMIN_PW='najiu888';

const M=[
{id:'jc',cat:'🫓 煎烙面食类',n:'韭菜盒子',p:3,e:'🥟',u:'片'},
{id:'qz',cat:'🫓 煎烙面食类',n:'茄子盒子',p:3,e:'🍆',u:'片'},
{id:'ch',cat:'🫓 煎烙面食类',n:'葱花饼',p:3,e:'🫓',u:'片'},
{id:'yb',cat:'🫓 煎烙面食类',n:'油饼',p:1,e:'🫓',u:'个'},
{id:'yt',cat:'🫓 煎烙面食类',n:'油条',p:1,e:'🥖',u:'个'},
{id:'rb',cat:'🥟 包子类',n:'肉包',p:2,e:'🥟',u:'个'},
{id:'jcb',cat:'🥟 包子类',n:'韭菜包',p:1.5,e:'🥟',u:'个'},
{id:'qzb',cat:'🥟 包子类',n:'茄子包',p:1.5,e:'🥟',u:'个'},
{id:'ngb',cat:'🥟 包子类',n:'南瓜包',p:1.5,e:'🥟',u:'个'},
{id:'szd',cat:'🥚 蛋类',n:'水煮蛋',p:1.5,e:'🥚',u:'个'},
{id:'cyd',cat:'🥚 蛋类',n:'茶叶蛋',p:1.5,e:'🥚',u:'个'},
{id:'bbz',cat:'🥣 粥汤类',n:'八宝粥',p:3,e:'🥣',u:'碗'},
{id:'zct',cat:'🥣 粥汤类',n:'紫菜汤',p:3,e:'🍲',u:'碗'},
{id:'hdf',cat:'🥣 粥汤类',n:'烩豆腐',p:3,e:'🫘',u:'碗'},
{id:'dfn',cat:'🥣 粥汤类',n:'豆腐脑',p:3,e:'🥣',u:'碗'},
{id:'bt',cat:'🥣 粥汤类',n:'拌汤',p:3,e:'🍲',u:'碗'},
{id:'hmz',cat:'🥣 粥汤类',n:'黑米粥',p:2,e:'🥣',u:'碗'},
{id:'mt',cat:'🥣 粥汤类',n:'米汤',p:2,e:'🥣',u:'碗'},
{id:'yc',cat:'🥣 粥汤类',n:'油茶',p:2,e:'🍵',u:'碗'}
];

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let isAdmin=false,cur=1,cache=[];
const cart={};for(let t=1;t<=4;t++){cart[t]={};M.forEach(m=>cart[t][m.id]=0);}

(function(){
    let h='',last='';
    M.forEach(m=>{
        if(m.cat!==last){h+='<div class="cat">'+m.cat+'</div>';last=m.cat;}
        h+='<div class="row"><div class="info"><div class="n">'+m.n+'</div><div class="p">¥'+m.p.toFixed(2)+'/'+m.u+'</div></div><div class="qw"><div class="bq" onclick="cq(\''+m.id+'\',-1)">−</div><div class="qt" id="q-'+m.id+'">0</div><div class="bq" onclick="cq(\''+m.id+'\',1)">+</div></div><div class="sb" id="s-'+m.id+'">¥0</div></div>';
    });
    document.getElementById('menu').innerHTML=h;
})();

function st(t){cur=t;for(let i=1;i<=4;i++)document.getElementById('tb'+i).classList.remove('on');document.getElementById('tb'+t).classList.add('on');document.getElementById('ct').textContent='📍 当前：🪑 '+t+'号桌';M.forEach(m=>{document.getElementById('q-'+m.id).textContent=cart[t][m.id];document.getElementById('s-'+m.id).textContent='¥'+(cart[t][m.id]*m.p).toFixed(2);});ut();}
function cq(id,d){let n=cart[cur][id]+d;if(n<0)n=0;if(n>99)n=99;cart[cur][id]=n;document.getElementById('q-'+id).textContent=n;document.getElementById('s-'+id).textContent='¥'+(n*M.find(m=>m.id===id).p).toFixed(2);ut();}
function ut(){let t=0;M.forEach(m=>t+=cart[cur][m.id]*m.p);document.getElementById('tp').textContent='¥'+t.toFixed(2);}

function showConfirm(msg,btnText,isDanger){return new Promise(resolve=>{let d=document.createElement('div');d.className='confirm-overlay';d.innerHTML='<div class="confirm-box"><div class="msg">'+msg+'</div><button id="cfmOk" class="confirm-btn '+(isDanger?'red':'org')+'">'+btnText+'</button><button id="cfmCancel" class="confirm-cancel">取消</button></div>';document.body.appendChild(d);document.getElementById('cfmOk').onclick=()=>{d.remove();resolve(true);};document.getElementById('cfmCancel').onclick=()=>{d.remove();resolve(false);};});}
function showAlert(msg){return new Promise(resolve=>{let d=document.createElement('div');d.className='confirm-overlay';d.innerHTML='<div class="confirm-box"><div class="msg">'+msg+'</div><button id="alertOk" class="confirm-btn org">确定</button></div>';document.body.appendChild(d);document.getElementById('alertOk').onclick=()=>{d.remove();resolve();};});}

function clearCart(){
    showConfirm('清空'+cur+'号桌？','🗑️ 清空',false).then(ok=>{
        if(!ok)return;
        M.forEach(m=>{cart[cur][m.id]=0;document.getElementById('q-'+m.id).textContent='0';document.getElementById('s-'+m.id).textContent='¥0';});
        ut();
    });
}

function toggleAdmin(){
    if(isAdmin){
        isAdmin=false;cache=[];
        document.getElementById('badge').textContent='';
        document.getElementById('btnA').textContent='🔐 管理员';
        ld();return;
    }
    let p=prompt('请输入管理密码：');
    if(p===ADMIN_PW){
        isAdmin=true;
        document.getElementById('badge').innerHTML='<span class="badge">管理员</span>';
        document.getElementById('btnA').textContent='🔓 退出';
        ld();
    }else if(p!==null){showAlert('密码错误');}
}

async function checkout(){
    let items=[],t=0,c=0,detail='';
    M.forEach(m=>{let q=cart[cur][m.id];if(q>0){let s=q*m.p;detail+=m.e+' '+m.n+' ×'+q+m.u+' = ¥'+s.toFixed(2)+'\n';items.push({name:m.n,emoji:m.e,qty:q,unit:m.u,price:m.p,subtotal:s});t+=s;c+=q;}});
    if(c===0){await showAlert('请先选餐');return;}
    detail='📋 '+cur+'号桌订单：\n\n'+detail+'\n————————\n💰 合计：¥'+t.toFixed(2)+'\n📦 共'+c+'件';
    let ok=await showConfirm(detail,'✅ 确认下单',false);
    if(!ok)return;
    await sb.from('orders').insert({table_num:cur,items:items,total:t});
    await showAlert('下单成功！');
    M.forEach(m=>{cart[cur][m.id]=0;document.getElementById('q-'+m.id).textContent='0';document.getElementById('s-'+m.id).textContent='¥0';});
    ut();ld();
}

async function ld(){let{data,error}=await sb.from('orders').select('*').order('created_at',{ascending:false}).setHeader('x-admin-key',ADMIN_PW);if(!error){cache=data||[];}rp();}
function getHD(){return cache.map(o=>({id:o.id,date:new Date(o.created_at).toLocaleString('zh-CN'),table:o.table_num,items:o.items,total:o.total}));}
function ci(ods){let c={};ods.forEach(o=>o.items.forEach(i=>{if(!c[i.name])c[i.name]=0;c[i.name]+=i.qty;}));return Object.entries(c).sort((a,b)=>b[1]-a[1]);}
function brk(data,max=5){if(data.length===0)return'<div style="text-align:center;color:#ccc;padding:10px;">暂无</div>';let mx=data[0][1];return data.slice(0,max).map((r,i)=>{let cl=i===0?'g1':i===1?'g2':i===2?'g3':'g4';return'<div class="rk"><div class="rb '+cl+'">'+(i+1)+'</div><span class="rn">'+r[0]+'</span><div class="rbar"><div class="rf" style="width:'+(r[1]/mx*100).toFixed(0)+'%"></div></div><span>'+r[1]+'</span></div>';}).join('');}
function rp(){
    let h=getHD(),ts=new Date().toLocaleDateString('zh-CN'),tod=h.filter(o=>o.date.includes(ts)),tt=0;tod.forEach(o=>tt+=o.total);
    let tb={1:0,2:0,3:0,4:0},tc={1:0,2:0,3:0,4:0};tod.forEach(o=>{let tn=o.table;if(tb[tn]!==undefined){tb[tn]+=o.total;tc[tn]++;}});
    let th='';for(let t=1;t<=4;t++)th+='<div class="tsr">🪑 '+t+'号桌 <span>¥'+tb[t].toFixed(2)+'</span>（'+tc[t]+'单）</div>';
    // 最近5单，字体加大+删除按钮
    let recentHTML='<div class="st" style="margin-top:8px">🕐 最近订单</div>';
    let recent=tod.slice(0,5);
    if(recent.length===0){
        recentHTML+='<div style="text-align:center;color:#ccc;font-size:12px;padding:8px">暂无</div>';
    }else{
        recent.forEach(o=>{
    let names=o.items.map(i=>i.name+'×'+i.qty).join('、');
    let delBtn = isAdmin ? '<button class="recent-delete" data-id="'+o.id+'" title="删除">🗑️</button>' : '';
    recentHTML+='<div class="recent-item" id="rec-'+o.id+'"><div class="rinfo"><div class="rname">🪑'+o.table+'号桌</div><div class="rdetail">'+names+'</div></div><span class="rprice">¥'+o.total.toFixed(2)+'</span>'+delBtn+'</div>';
});
    }
    let panelHTML='<div class="sb2"><div class="v">¥'+tt.toFixed(2)+'</div><div class="l">💰 今日销售额</div></div>'+'<div class="sr"><div class="ss"><div class="v">'+tod.length+'</div><div class="l">📋 今日订单</div></div></div>'+'<div class="st">🏆 今日畅销排行</div>'+brk(ci(tod),5)+'<div class="st" style="margin-top:8px">🪑 各桌今日</div>'+th+recentHTML;
    if(isAdmin){panelHTML+='<button class="btn g" style="width:100%;margin-top:8px" onclick="openHistory()">📋 全部记录</button>';}
    document.getElementById('panel').innerHTML=panelHTML;
    // 绑定右侧最近订单删除按钮
    document.querySelectorAll('.recent-delete').forEach(b=>{
        b.onclick=function(){del(parseInt(this.dataset.id));};
    });
}

function openExport(){if(!isAdmin){showAlert('请先登录管理员');return;}document.getElementById('panel').innerHTML='<div class="st">📥 导出Excel</div><button class="btn" style="display:block;width:100%;padding:8px;margin:4px 0;border-color:#43a047;color:#43a047" onclick="de(\'today\')">📅 仅今日</button><button class="btn" style="display:block;width:100%;padding:8px;margin:4px 0;border-color:#43a047;color:#43a047" onclick="de(\'week\')">📆 最近7天</button><button class="btn" style="display:block;width:100%;padding:8px;margin:4px 0;border-color:#43a047;color:#43a047" onclick="de(\'all\')">📚 全部历史</button><button class="btn" style="width:100%;margin-top:6px" onclick="rp()">↩ 返回</button>';}
function de(range){let h=getHD(),f=h,label='全部',now=new Date();if(range==='today'){let ts=now.toLocaleDateString('zh-CN');f=h.filter(x=>x.date.includes(ts));label='今日';}else if(range==='week'){let wa=new Date(now.getTime()-7*24*60*60*1000).toLocaleDateString('zh-CN');f=h.filter(x=>x.date.split(' ')[0]>=wa);label='7天';}if(f.length===0){alert('无数据');return;}let csv='\uFEFF序号,日期,桌号,商品,数量,单价,小计,订单总额\n',idx=1;f.forEach(o=>o.items.forEach(i=>{csv+=idx+',"'+o.date+'",'+o.table+'号桌,"'+i.name+'",'+i.qty+','+i.price.toFixed(2)+','+i.subtotal.toFixed(2)+','+o.total.toFixed(2)+'\n';idx++;}));let blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='早餐订单_'+label+'.csv';a.click();alert('✅ 已导出「'+label+'」数据！');}

function buildHistoryHTML(){let h=getHD(),total=h.length,sales=0;h.forEach(x=>sales+=x.total);let list=h.slice(0,50);let html='<div class="modal-head"><span>📊 全部历史记录</span><button class="modal-close" onclick="closeHistory()">✕</button></div>';html+='<div style="display:flex;gap:6px;margin-bottom:10px" id="histStats"><div class="ss"><div class="v" id="histTotal">'+total+'</div><div class="l">总订单</div></div><div class="ss"><div class="v" id="histSales">¥'+sales.toFixed(2)+'</div><div class="l">累计销售</div></div></div>';html+='<div class="st">🏆 累计畅销排行</div>'+brk(ci(h),10)+'<hr style="margin:8px 0">';html+='<div id="histList">';html+=list.length===0?'<div style="text-align:center;color:#ccc;">暂无记录</div>':list.map(x=>{let ih=x.items.map(i=>i.emoji+' '+i.name+' ×'+i.qty+'（¥'+i.subtotal.toFixed(2)+'）').join('<br>');return'<div class="hitem" id="hitem-'+x.id+'"><button class="del-btn" data-id="'+x.id+'">🗑️</button><div class="hd"><span class="htag">🪑 '+x.table+'号桌</span> '+x.date+'</div><div class="hdet">'+ih+'</div><div class="ht">💰 ¥'+x.total.toFixed(2)+'</div></div>';}).join('');html+='</div><button class="danger" id="btnDelAll">🗑️ 清空全部</button>';return html;}
function openHistory(){
    if(!isAdmin){showAlert('请先登录管理员');return;}
    closeHistory();
    let overlay=document.createElement('div');
    overlay.id='historyOverlay';
    overlay.className='modal-overlay';
    overlay.onclick=function(e){if(e.target===overlay)closeHistory();};
    let box=document.createElement('div');
    box.className='modal-box';
    box.id='historyBox';
    box.innerHTML=buildHistoryHTML();
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    bindHistoryEvents();
}
function bindHistoryEvents(){document.querySelectorAll('#histList .del-btn').forEach(b=>{b.onclick=function(){del(parseInt(this.dataset.id));};});let ba=document.getElementById('btnDelAll');if(ba)ba.onclick=delAll;}
function closeHistory(){let overlay=document.getElementById('historyOverlay');if(overlay)overlay.remove();}

async function del(id){let ok=await showConfirm('确定删除该订单？','🗑️ 确认删除',true);if(!ok)return;await sb.from('orders').delete().eq('id',id).setHeader('x-admin-key',ADMIN_PW);await ld();let h=getHD(),total=h.length,sales=0;h.forEach(x=>sales+=x.total);await showAlert('✅ 已删除\n\n📊 当前累计：\n总订单：'+total+' 单\n累计销售：¥'+sales.toFixed(2));rp();}
async function delAll(){let ok=await showConfirm('⚠️ 清空全部历史记录？\n此操作不可恢复','🗑️ 确认清空',true);if(!ok)return;await sb.from('orders').delete().gt('id',0).setHeader('x-admin-key',ADMIN_PW);await ld();closeHistory();rp();await showAlert('✅ 已清空全部历史记录');}

st(1);
ld();
setInterval(()=>{ld();},10000);
</script>
